name: Daily Merged PR Report

on:
  schedule:
    # Runs at 00:00 UTC daily = 05:30 AM IST (UTC+5:30)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allows manual trigger for testing
  pull_request:
    types: [closed]   # Fires when a PR is closed; job condition below filters for merges only

jobs:
  merged-pr-report:
    name: Fetch Latest Merged PR and Send Email Report
    runs-on: ubuntu-latest
    # For pull_request events: only run when the PR was actually merged, not just closed
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest merged PR via GitHub API
        id: fetch_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the most recently merged PR
          PR_JSON=$(gh pr list \
            --repo "$REPO" \
            --state merged \
            --limit 1 \
            --json number,title,author,mergedAt,url,body,labels,baseRefName,headRefName \
            2>/dev/null)

          # Parse fields
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // "N/A"')
          PR_TITLE=$(echo "$PR_JSON"  | jq -r '.[0].title // "N/A"')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.[0].author.login // "N/A"')
          PR_MERGED=$(echo "$PR_JSON" | jq -r '.[0].mergedAt // "N/A"')
          PR_URL=$(echo "$PR_JSON"    | jq -r '.[0].url // "N/A"')
          PR_BASE=$(echo "$PR_JSON"   | jq -r '.[0].baseRefName // "N/A"')
          PR_HEAD=$(echo "$PR_JSON"   | jq -r '.[0].headRefName // "N/A"')
          PR_LABELS=$(echo "$PR_JSON" | jq -r 'if (.[0].labels | length) > 0 then [.[0].labels[].name] | join(", ") else "None" end')
          PR_BODY=$(echo "$PR_JSON"   | jq -r '.[0].body // "No description provided."')

          # Truncate body to 2000 chars to keep email manageable
          PR_BODY_TRIMMED=$(echo "$PR_BODY" | head -c 2000)

          # Write to GITHUB_ENV for use in later steps (use heredoc for multi-line)
          {
            echo "PR_NUMBER=$PR_NUMBER"
            echo "PR_TITLE=$PR_TITLE"
            echo "PR_AUTHOR=$PR_AUTHOR"
            echo "PR_MERGED=$PR_MERGED"
            echo "PR_URL=$PR_URL"
            echo "PR_BASE=$PR_BASE"
            echo "PR_HEAD=$PR_HEAD"
            echo "PR_LABELS=$PR_LABELS"
            echo "PR_BODY<<EOF"
            echo "$PR_BODY_TRIMMED"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Build email body
        id: build_email
        run: |
          REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          REPO_NAME="${{ github.repository }}"

          # Write email body directly into GITHUB_ENV (avoids heredoc indentation issues in YAML)
          {
            echo "EMAIL_BODY<<BODY_EOF"
            echo "Daily Merged PR Report — ${REPO_NAME}"
            echo "========================================="
            echo "Report generated : ${REPORT_DATE}"
            echo "Repository        : https://github.com/${REPO_NAME}"
            echo ""
            echo "-----------------------------------------"
            echo "LATEST MERGED PULL REQUEST"
            echo "-----------------------------------------"
            echo "PR Number  : #${PR_NUMBER}"
            echo "Title      : ${PR_TITLE}"
            echo "Author     : ${PR_AUTHOR}"
            echo "Merged At  : ${PR_MERGED}"
            echo "Base Branch: ${PR_BASE}"
            echo "Head Branch: ${PR_HEAD}"
            echo "Labels     : ${PR_LABELS}"
            echo "URL        : ${PR_URL}"
            echo ""
            echo "Description:"
            echo "${PR_BODY}"
            echo "-----------------------------------------"
            echo "This is an automated report. Do not reply to this email."
            echo "BODY_EOF"
          } >> "$GITHUB_ENV"

          echo "subject=Daily Merged PR Report — $REPO_NAME [$(date +'%Y-%m-%d')]" >> "$GITHUB_OUTPUT"

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          # ── SMTP configuration ──────────────────────────────────────────────
          # Store these as repository secrets:
          #   MAIL_SERVER   → e.g. smtp.gmail.com
          #   MAIL_PORT     → e.g. 465 (SSL) or 587 (TLS/STARTTLS)
          #   MAIL_USERNAME → your sender email address
          #   MAIL_PASSWORD → app-specific password or SMTP password
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          secure: true   # true = SSL/TLS; set to false and use tls: true for STARTTLS

          # ── Email fields ────────────────────────────────────────────────────
          subject: ${{ steps.build_email.outputs.subject }}
          # Comma-separated list of recipients — store in secret or list directly
          to: ${{ secrets.MAIL_RECIPIENTS }}
          from: "GitHub Actions Bot <${{ secrets.MAIL_USERNAME }}>"
          body: ${{ env.EMAIL_BODY }}
          # Optional: send an HTML version as well (see html_body below)
          # html_body: ${{ env.EMAIL_HTML }}

      # ── Optional: post a summary to the Actions run log ───────────────────
      - name: Print summary
        run: |
          echo "## Daily Merged PR Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| PR | [#${PR_NUMBER}](${PR_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Title | ${PR_TITLE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Author | ${PR_AUTHOR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Merged At | ${PR_MERGED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Labels | ${PR_LABELS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Email sent to: \`${{ secrets.MAIL_RECIPIENTS }}\`" >> "$GITHUB_STEP_SUMMARY"
